<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:#eee;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
.status{font-size:12px;color:#666;margin-top:4px;}
.status.on{color:#4caf50;}
.status.err{color:#f44;}
button{background:#222;border:1px solid #444;color:#eee;padding:12px 20px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;max-width:300px;}
button.primary{background:#1a0a2e;border-color:#7744cc;}
button:active{background:#333;}
.row{display:flex;gap:8px;width:100%;max-width:300px;}
.row button{flex:1;}
input[type=range]{width:100%;max-width:300px;}
.label{font-size:12px;color:#888;width:100%;max-width:300px;}
.log{width:100%;max-width:300px;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px;font-size:11px;color:#555;height:100px;overflow-y:auto;}
</style>
</head>
<body>

<div class="label">hush control</div>
<div class="status" id="st">未连接</div>

<button class="primary" onclick="connect()">连接玩具</button>

<div class="label">强度 <span id="iv">1</span>/5</div>
<input type="range" min="1" max="5" value="1" id="sl" oninput="document.getElementById('iv').textContent=this.value">

<div class="row">
  <button onclick="go(1)">吮吸</button>
  <button onclick="go(0)" style="border-color:#553333;">停止</button>
</div>

<div class="log" id="log"></div>

<script>
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb';
const WR='0000ffe1-0000-1000-8000-00805f9b34fb';
const NTF='0000ffe2-0000-1000-8000-00805f9b34fb';
const API='https://hush-shenzhishu12-3368s-projects.vercel.app/api/state';

let wc=null,lastAt=0;

function log(m){const e=document.getElementById('log');e.innerHTML+=new Date().toLocaleTimeString()+' '+m+'<br>';e.scrollTop=e.scrollHeight;}

async function connect(){
  try{
    const d=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[SVC]
    });
    const s=await d.gatt.connect();
    const sv=await s.getPrimaryService(SVC);
    wc=await sv.getCharacteristic(WR);
    const nc=await sv.getCharacteristic(NTF);
    await nc.startNotifications();
    nc.addEventListener('characteristicvaluechanged',e=>{
      const v=new Uint8Array(e.target.value.buffer);
      log('notify: '+Array.from(v).map(x=>x.toString(16).padStart(2,'0')).join(' '));
    });
    document.getElementById('st').textContent='已连接: '+d.name;
    document.getElementById('st').className='status on';
    log('连接成功');
    poll();
  }catch(e){
    log('错误: '+e.message);
    document.getElementById('st').className='status err';
  }
}

async function send(mode,intensity){
  if(!wc)return;
  const cmd=new Uint8Array([0x55,0x09,0x00,0x00,mode,intensity,0x00]);
  await wc.writeValueWithoutResponse(cmd);
  log('发送 mode='+mode+' int='+intensity);
}

async function go(mode){
  const i=parseInt(document.getElementById('sl').value);
  await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd:mode?'set':'stop',mode:mode,intensity:i})});
  if(wc)await send(mode,mode?i:0);
}

async function poll(){
  if(!wc)return;
  try{
    const r=await fetch(API);
    const s=await r.json();
    if(s.updated_at>lastAt){
      lastAt=s.updated_at;
      if(s.cmd==='stop')await send(0,0);
      else if(s.cmd==='set')await send(s.mode,s.intensity);
    }
  }catch(e){}
  setTimeout(poll,1000);
}
</script>
</body>
</html>
